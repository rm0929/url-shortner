# Ingress — exposes both services through a single load balancer
# For minikube: run `minikube addons enable ingress` first
# For AWS: replace with ALB ingress controller annotations
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: url-shortener-ingress
  namespace: url-shortener
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          - path: /shorten
            pathType: Prefix
            backend:
              service:
                name: url-service
                port:
                  number: 8000
          - path: /analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: url-service
                port:
                  number: 8000
